name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      only-markdown: ${{ steps.check.outputs.only-markdown }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check if only existing markdown files were modified
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # First push to a branch has no meaningful base
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "only-markdown=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-status "$BASE" "${{ github.sha }}")
          if [ -z "$changed" ]; then
            echo "only-markdown=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | awk 'NF && ($1 != "M" || $2 !~ /\.md$/) { exit 1 }'; then
            echo "only-markdown=true" >> "$GITHUB_OUTPUT"
          else
            echo "only-markdown=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint (Node 22)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
        env:
          HUSKY: '0'
      - run: npm run verify:build
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run lint
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run lint:json
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run lint:markdown
      - run: npm run lint:yaml
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run lint:dockerfile
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run lint:shell
        if: needs.changes.outputs.only-markdown != 'true'
      - run: npm run typecheck
        if: needs.changes.outputs.only-markdown != 'true'

  test:
    name: Test (Node 22, MongoDB ${{ matrix.mongodb-version }})
    needs: changes
    if: needs.changes.outputs.only-markdown != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mongodb-version: ['8.2', '8.0', '7.0', '5.0']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
        env:
          HUSKY: '0'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - run: mkdir -p docker/Dockerfiles
      - run: npm run test:container
        env:
          MONGODB_VERSION: ${{ matrix.mongodb-version }}
          NODEJS_VERSION: '22'
          DOCKER_BUILD_CACHE: gha
          DOCKER_BUILD_CACHE_SCOPE: variety-test-${{ runner.os }}-${{ runner.arch }}-mongodb-${{ matrix.mongodb-version }}-node-22

  test-smoke:
    name: Smoke Test (Node 24, MongoDB 8.2)
    needs: changes
    if: needs.changes.outputs.only-markdown != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
        env:
          HUSKY: '0'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - run: mkdir -p docker/Dockerfiles
      - run: npm run test:container
        env:
          MONGODB_VERSION: '8.2'
          NODEJS_VERSION: '24'
          DOCKER_BUILD_CACHE: gha
          DOCKER_BUILD_CACHE_SCOPE: variety-test-${{ runner.os }}-${{ runner.arch }}-mongodb-8.2-node-24

  required-ci-gate:
    name: Required CI Gate
    needs: [changes, lint, test, test-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required CI result
        env:
          ONLY_MARKDOWN: ${{ needs.changes.outputs.only-markdown }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          SMOKE_RESULT: ${{ needs.test-smoke.result }}
        run: |
          {
            echo "### Required CI Gate"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Detect changes | $CHANGES_RESULT |"
            echo "| Lint | $LINT_RESULT |"
            echo "| Test matrix | $TEST_RESULT |"
            echo "| Smoke test | $SMOKE_RESULT |"
            echo
            echo "only-markdown: \`$ONLY_MARKDOWN\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Detect changes did not succeed." >&2
            exit 1
          fi

          if [ "$LINT_RESULT" != "success" ]; then
            echo "Lint did not succeed." >&2
            exit 1
          fi

          if [ "$ONLY_MARKDOWN" = "true" ]; then
            if [ "$TEST_RESULT" != "skipped" ] || [ "$SMOKE_RESULT" != "skipped" ]; then
              echo "Markdown-only changes should skip test jobs; got test=$TEST_RESULT smoke=$SMOKE_RESULT." >&2
              exit 1
            fi

            echo "Markdown-only change: tests were intentionally skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$TEST_RESULT" != "success" ]; then
            echo "Test matrix did not succeed." >&2
            exit 1
          fi

          if [ "$SMOKE_RESULT" != "success" ]; then
            echo "Smoke test did not succeed." >&2
            exit 1
          fi

          echo "Full CI passed." >> "$GITHUB_STEP_SUMMARY"
