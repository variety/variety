name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm install
        env:
          HUSKY: '0'
      - run: npm run lint
      - run: npm run lint:json
      - run: npm run lint:markdown
      - run: npm run lint:yaml
      - run: npm run lint:dockerfile
      - run: npm run lint:shell
      - run: npm run typecheck

  test:
    name: Test (Node 22, MongoDB ${{ matrix.mongodb-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mongodb-version: ['7.0', '8.0']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm install
        env:
          HUSKY: '0'
      - run: mkdir -p docker/Dockerfiles
      - run: npm run test:docker
        env:
          MONGODB_VERSION: ${{ matrix.mongodb-version }}
          NODEJS_VERSION: '22'

  test-smoke:
    name: Smoke Test (Node 24, MongoDB 8.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm install
        env:
          HUSKY: '0'
      - run: mkdir -p docker/Dockerfiles
      - run: npm run test:docker
        env:
          MONGODB_VERSION: '8.0'
          NODEJS_VERSION: '24'
